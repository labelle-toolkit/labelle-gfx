name: CI - SDL Backend Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sdl-backend-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout labelle-core (sibling dependency)
        uses: actions/checkout@v4
        with:
          repository: labelle-toolkit/labelle-core
          path: ../labelle-core

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install dependencies for SDL2
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-ttf-dev \
            libgl1-mesa-dev \
            xvfb \
            git-lfs

      - name: Setup Git LFS
        run: git lfs install

      - name: Cache Zig dependencies
        uses: actions/cache@v4
        with:
          path: .zig-cache
          key: zig-cache-sdl-${{ runner.os }}-${{ hashFiles('build.zig.zon') }}
          restore-keys: |
            zig-cache-sdl-${{ runner.os }}-

      - name: Build SDL example
        run: |
          set -euo pipefail
          success=0
          for attempt in 1 2 3; do
            if zig build; then
              success=1
              break
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "::warning::Build attempt $attempt failed, retrying in 10s..."
              sleep 10
            fi
          done
          if [ "$success" -ne 1 ]; then
            echo "::error::Build failed after 3 attempts."
            exit 1
          fi

      - name: Run SDL example
        run: |
          # Start virtual framebuffer for headless rendering
          Xvfb :99 -screen 0 1024x768x24 &
          export DISPLAY=:99
          sleep 2

          echo "::group::Running SDL backend example"
          # The SDL example auto-exits after 120 frames
          if timeout 60 zig build run-17_sdl_backend 2>&1; then
            echo "✅ SDL example completed successfully!"
          else
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 124 ]; then
              echo "::error::SDL example timed out after 60 seconds"
              exit 1
            else
              echo "::error::SDL example failed with exit code $EXIT_CODE"
              exit $EXIT_CODE
            fi
          fi
          echo "::endgroup::"

      - name: Create summary
        if: always()
        run: |
          echo "## 🎮 SDL Backend Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ **SDL backend example ran successfully!**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The example:" >> $GITHUB_STEP_SUMMARY
            echo "- Initialized SDL2 window" >> $GITHUB_STEP_SUMMARY
            echo "- Rendered shapes (rectangles, circles, triangles, polygons)" >> $GITHUB_STEP_SUMMARY
            echo "- Ran animation system" >> $GITHUB_STEP_SUMMARY
            echo "- Auto-exited after 120 frames" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **SDL backend example failed**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check the workflow logs for details." >> $GITHUB_STEP_SUMMARY
          fi
