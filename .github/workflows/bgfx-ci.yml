name: CI - bgfx Backend Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bgfx-backend-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout labelle-core (sibling dependency)
        uses: actions/checkout@v4
        with:
          repository: labelle-toolkit/labelle-core
          path: labelle-core-tmp

      - name: Move labelle-core to sibling directory
        run: mv labelle-core-tmp ../labelle-core

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install dependencies for bgfx and GLFW
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libxext-dev \
            libxfixes-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libasound2-dev \
            xvfb \
            git-lfs

      - name: Setup Git LFS
        run: git lfs install

      - name: Cache Zig dependencies
        uses: actions/cache@v4
        with:
          path: .zig-cache
          key: zig-cache-bgfx-${{ runner.os }}-${{ hashFiles('build.zig.zon') }}
          restore-keys: |
            zig-cache-bgfx-${{ runner.os }}-

      - name: Build bgfx example
        run: |
          set -euo pipefail
          success=0
          for attempt in 1 2 3; do
            if zig build; then
              success=1
              break
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "::warning::Build attempt $attempt failed, retrying in 10s..."
              sleep 10
            fi
          done
          if [ "$success" -ne 1 ]; then
            echo "::error::Build failed after 3 attempts."
            exit 1
          fi

      - name: Run bgfx example in CI mode
        run: |
          # Start virtual framebuffer for headless rendering
          Xvfb :99 -screen 0 1024x768x24 &
          export DISPLAY=:99
          sleep 2

          echo "::group::Running bgfx backend example"
          # Run with CI_TEST=1 to auto-exit after a few frames
          if CI_TEST=1 timeout 60 zig build run-23_bgfx_backend 2>&1; then
            echo "✅ bgfx example completed successfully!"
          else
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 124 ]; then
              echo "::error::bgfx example timed out after 60 seconds"
              exit 1
            else
              echo "::error::bgfx example failed with exit code $EXIT_CODE"
              exit $EXIT_CODE
            fi
          fi
          echo "::endgroup::"

      - name: Create summary
        if: always()
        run: |
          echo "## 🎮 bgfx Backend Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ **bgfx backend example ran successfully!**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The example:" >> $GITHUB_STEP_SUMMARY
            echo "- Initialized GLFW window" >> $GITHUB_STEP_SUMMARY
            echo "- Set up bgfx renderer" >> $GITHUB_STEP_SUMMARY
            echo "- Loaded textures via stb_image" >> $GITHUB_STEP_SUMMARY
            echo "- Rendered shapes and sprites" >> $GITHUB_STEP_SUMMARY
            echo "- Ran for 60 frames without errors" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **bgfx backend example failed**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check the workflow logs for details." >> $GITHUB_STEP_SUMMARY
          fi
